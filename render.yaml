databases:
  - name: cafe-db
    databaseName: cafedb
    user: cafeuser
    plan: free

services:
  - type: web
    name: cafe-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn cafe_management.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
