{% extends 'cafe/base.html' %}

{% block title %}Delete Menu Item - Cafe Management System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card glass-card border-0">
            <div class="card-header bg-transparent border-0 pt-4 pb-0 text-center">
                <div class="text-danger mb-3"><i class="fas fa-exclamation-triangle fa-3x opacity-75"></i></div>
                <h4 class="mb-0 fw-bold text-dark">Confirm Deletion</h4>
            </div>
            <div class="card-body text-center p-4">
                <p class="fs-5">Are you sure you want to delete the menu item <br><strong>"{{ object.name }}"</strong>?</p>
                <p class="text-muted small mb-4">This action cannot be undone.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger rounded-pill px-4 me-2 shadow-sm">Yes, Delete</button>
                    <a href="{% url 'cafe:menu_list' %}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
